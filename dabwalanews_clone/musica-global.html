<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÚSICA GLOBAL - Mktxo.new</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #0088ff;
            --accent-glow: rgba(0, 136, 255, 0.5);
            --nav-bg: #0a0a0c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at top left, #1a1a2e, #0a0a0c); 
            color: #e1e1e6; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
            pointer-events: none;
        }
        .glow-1 { top: -200px; right: -200px; }
        .glow-2 { bottom: -200px; left: -200px; background: #ad34fa; }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }

        .search-hero {
            padding: 100px 20px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .search-hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.1;
            letter-spacing: -2px;
        }
        .search-hero p {
            font-size: 1.2rem;
            color: #999;
            margin-bottom: 40px;
        }

        .search-wrapper {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }
        .search-input-container {
            display: flex;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 8px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .search-input-container:focus-within {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 40px var(--accent-glow);
            transform: scale(1.02);
        }
        .search-input-container input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            padding: 15px 25px;
            outline: none;
            font-family: 'Outfit', sans-serif;
        }
        .search-input-container button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 40px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .search-input-container button:hover {
            background: #fff;
            color: #000;
        }

        .results-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px 150px;
        }
        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            display: none;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .track-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .track-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .track-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 16px;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.4s;
        }
        .track-card:hover .track-image {
            transform: scale(1.05);
        }
        .track-info { flex: 1; }
        .track-name { 
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem; 
            font-weight: 700; 
            margin-bottom: 5px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .track-artist { color: #aaa; font-size: 1rem; margin-bottom: 20px; }

        .actions {
            display: flex;
            gap: 10px;
        }
        .btn-play {
            background: var(--accent);
            color: white;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-download {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            width: 50px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            transition: 0.3s;
            font-size: 1.2rem;
        }
        .btn-download:hover { background: #fff; color: #000; }

        /* Floating Player */
        #player-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            width: 90%;
            max-width: 900px;
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 1000;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #player-dock.active { transform: translateX(-50%) translateY(0); }
        .player-info { display: flex; align-items: center; gap: 15px; width: 300px; }
        .player-info img { width: 60px; height: 60px; border-radius: 12px; }
        .player-meta { overflow: hidden; }
        .player-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { color: #888; font-size: 0.9rem; }
        audio { flex: 1; height: 40px; border-radius: 10px; }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 768px) {
            .search-hero h1 { font-size: 2.8rem; }
            .header-container { padding: 0 20px; }
            #player-dock { flex-direction: column; bottom: 0; width: 100%; border-radius: 30px 30px 0 0; padding: 20px; }
            .player-info { width: 100%; }
            audio { width: 100%; }
        }
    </style>
</head>
<body>

<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>

<header>
    <div class="header-container">
        <a href="/" class="logo">DA BWALA <span>NEWS</span></a>
        <div style="display: flex; gap: 20px;">
            <a href="/" style="color: #888; text-decoration: none; font-weight: 600;">Home</a>
            <a href="#search" style="color: white; text-decoration: none; font-weight: 600;">Global</a>
        </div>
    </div>
</header>

<main>
    <section class="search-hero" id="search">
        <h1>Qualquer música. <br><span style="color: var(--accent);">Qualquer lugar.</span></h1>
        <p>Acesse o maior banco de dados musical do planeta. Pesquise por artistas angolanos, brasileiros ou globais.</p>
        
        <div class="search-wrapper">
            <div class="search-input-container">
                <input type="text" id="music-query" placeholder="O que você quer ouvir agora?">
                <button onclick="searchMusic()">EXPLORAR</button>
            </div>
        </div>
    </section>

    <div class="results-container">
        <h2 class="section-title" id="results-title">Resultados Encontrados</h2>
        <div id="loader" style="display: none; text-align: center; padding: 50px;">
            <div class="spinner" style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; margin: 0 auto;"></div>
            <p style="margin-top: 20px; color: #888;">Escaneando satélites globais...</p>
        </div>
        <div class="music-grid" id="music-results">
            <!-- Content dynamic -->
        </div>
    </div>
</main>

<div id="player-dock">
    <div class="player-info">
        <img id="dock-img" src="" alt="">
        <div class="player-meta">
            <div class="player-title" id="dock-title">Música</div>
            <div class="player-artist" id="dock-artist">Artista</div>
        </div>
    </div>
    <audio id="main-player" controls autoplay></audio>
    <a id="dock-download" href="" download="" class="btn-download" style="width: 150px; background: var(--accent);">BAIXAR AGORA</a>
</div>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
    async function searchMusic() {
        const query = document.getElementById('music-query').value;
        if (!query) return;

        const resultsGrid = document.getElementById('music-results');
        const loader = document.getElementById('loader');
        const title = document.getElementById('results-title');
        
        resultsGrid.innerHTML = '';
        loader.style.display = 'block';
        title.style.display = 'none';

        // Scroll to results
        window.scrollTo({ top: document.getElementById('search').offsetHeight + 50, behavior: 'smooth' });

        try {
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=20`);
            const data = await response.json();
            
            loader.style.display = 'none';
            title.style.display = 'block';

            if (data.results.length === 0) {
                resultsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #888;">Nenhum tesouro encontrado para esta busca.</div>';
                return;
            }

            data.results.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                
                const artwork = track.artworkUrl100.replace('100x100', '600x600');
                
                card.innerHTML = `
                    <img class="track-image" src="${artwork}" alt="${track.trackName}" loading="lazy">
                    <div class="track-info">
                        <div class="track-name">${track.trackName}</div>
                        <div class="track-artist">${track.artistName}</div>
                    </div>
                    <div class="actions">
                        <a href="javascript:void(0)" onclick="playTrack('${track.previewUrl}', '${track.trackName.replace(/'/g, "\\'")}', '${track.artistName.replace(/'/g, "\\'")}', '${artwork}')" class="btn-play">
                            <span>▶ PREVIEW</span>
                        </a>
                        <a href="${track.previewUrl}" download="${track.trackName}.m4a" class="btn-download" title="Baixar">↓</a>
                    </div>
                `;
                resultsGrid.appendChild(card);
            });
        } catch (error) {
            loader.style.display = 'none';
            resultsGrid.innerHTML = '<div style="color: #ff4d4d; grid-column: 1/-1; text-align: center;">Falha na conexão com a rede global.</div>';
        }
    }

    function playTrack(url, title, artist, img) {
        const dock = document.getElementById('player-dock');
        const player = document.getElementById('main-player');
        
        document.getElementById('dock-img').src = img;
        document.getElementById('dock-title').innerText = title;
        document.getElementById('dock-artist').innerText = artist;
        document.getElementById('dock-download').href = url;
        document.getElementById('dock-download').download = `${title}.m4a`;

        dock.classList.add('active');
        player.src = url;
        player.play();
    }

    // Support search on enter
    document.getElementById('music-query').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchMusic();
    });

    // Initial search if query in URL
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.has('q')) {
            document.getElementById('music-query').value = params.get('q');
            searchMusic();
        }
    };
</script>

</body>
</html>
